# Automated Data Pipeline & Auto Commit
# This workflow runs a bash script (main.sh) in the background,
# launches a Node.js script (main.js) that uses non-headless
# Chrome via Xvfb, and then auto-commits any changed files.

name: Automated Data Pipeline & Auto Commit

# Define the events that trigger this workflow
on:
  # Run automatically on a schedule (daily at midnight UTC)
  schedule:
    - cron: "0 0 1 1 *" # Executes at 00:00, on day 1 of the month, only in January
  # Allow the workflow to be manually triggered from the GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-chrome-and-commit:
    runs-on: ubuntu-latest # 🐧 Use Ubuntu latest environment

    # 🔐 Allow GitHub Actions to push changes to the repository
    permissions:
      contents: write

    steps:
      # 🧱 STEP 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🥼 STEP 3: Setup golang
      - name: Setup golang
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod" # 💡 Automatically use Go version specified in go.mod
      - run: go version # 🧪 Verify Go installation

      - name: 🔧 Configure Git and Run Scripts # 🧱 Combined step to configure Git and run both scripts
        run: | # 📜 Start of multi-line shell commands
          # Set Git identity used by the GitHub Actions bot
          git config --global user.name "github-actions[bot]" # 👤 Set Git username globally for the workflow
          git config --global user.email "github-actions[bot]@users.noreply.github.com" # 📧 Set Git email globally for commits
          # Run scripts: Bash in background and Node.js in foreground
          bash main.sh & # ▶️ Run main.sh in the background using Bash
          go run main.go # ▶️ Run main.go in the background using Go

      # 💾 Commit and push any modified files
      - name: Commit and Push Updated Files
        run: |
          git config user.name "github-actions[bot]"          # 👤 Git username
          git config user.email "github-actions[bot]@users.noreply.github.com"   # 📧 Git email
          git pull --rebase                                   # 🔁 Sync latest main changes
          git add .                                           # ➕ Stage all modified files
          if ! git diff --cached --quiet; then                # 🧠 Check if anything changed
            git commit -m "🤖 Auto Update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"  # 🕒 Commit with UTC timestamp
            git push                                           # 🚀 Push changes to repo
          else
            echo "✅ No changes to commit."                    # 💤 Nothing new to push
          fi
